<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="富贵一生">
<link rel="icon" type="image/png" sizes="32x32" href="./icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="./icon.png">
<title>AAA富贵一生 Excel</title>
<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --panel-2:#1d2129;
  --line:#2a2f3a;
  --text:#f2f4f8;
  --muted:#8c94a3;
  --accent:#f2f4f8;
  --accent-text:#0f1115;
  --danger:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.08), transparent 35%),
    linear-gradient(180deg, #12151b 0%, #0f1115 100%);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
button,input,select{font:inherit}
#splash{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,.10), transparent 30%),
    linear-gradient(180deg, #11141a, #0d0f13);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10000;
  padding:24px;
}
#splash img{
  width:156px;
  height:156px;
  border-radius:34px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}
#splash h1{
  margin-top:20px;
  font-size:22px;
  letter-spacing:.5px;
}
#splash p{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
  line-height:1.6;
}
.enter-btn{
  margin-top:28px;
  border:none;
  border-radius:16px;
  padding:14px 42px;
  background:var(--accent);
  color:var(--accent-text);
  font-size:16px;
  font-weight:700;
}
#app{
  display:none;
  min-height:100vh;
  flex-direction:column;
}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(15,17,21,.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.topbar h1{
  font-size:16px;
  font-weight:700;
}
.topbar-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.tbtn,.botbar button,.add-btn{
  border:none;
  border-radius:12px;
  cursor:pointer;
}
.tbtn{
  padding:8px 12px;
  background:var(--panel-2);
  color:var(--text);
  font-size:12px;
}
.tbtn.primary{
  background:var(--accent);
  color:var(--accent-text);
  font-weight:700;
}
.global{
  padding:12px 16px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.global-item{
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px;
  padding:10px;
}
.global-item label{
  display:block;
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}
.global-item input{
  width:100%;
  background:#12151b;
  border:1px solid var(--line);
  color:var(--text);
  padding:10px 11px;
  border-radius:10px;
  outline:none;
}
#cards{
  padding:14px 14px 96px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  overflow:hidden;
}
.card-hdr{
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.card-hdr span{
  font-size:12px;
  font-weight:700;
  color:var(--muted);
}
.card-hdr button{
  width:28px;
  height:28px;
  border:none;
  border-radius:8px;
  background:transparent;
  color:var(--danger);
  font-size:22px;
  line-height:1;
}
.card-body{
  padding:12px;
  display:grid;
  grid-template-columns:112px minmax(0,1fr);
  gap:12px;
}
.photo-col{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.photo-box{
  width:100%;
  aspect-ratio:5/6;
  background:#12151b;
  border:1.5px dashed rgba(255,255,255,.16);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  position:relative;
}
.photo-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.photo-placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  pointer-events:none;
  text-align:center;
}
.photo-placeholder strong{font-size:24px;line-height:1}
.photo-placeholder span{font-size:10px}
.photo-btns{display:flex;gap:6px}
.photo-btns button{
  flex:1;
  padding:8px 0;
  background:#12151b;
  border:1px solid var(--line);
  color:var(--text);
  font-size:11px;
}
.fields-col{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
.frow{
  display:grid;
  grid-template-columns:96px minmax(0,1fr);
  gap:8px;
  align-items:center;
}
.frow label{
  font-size:11px;
  color:var(--muted);
}
.frow input,.frow select{
  width:100%;
  background:#12151b;
  border:1px solid var(--line);
  color:var(--text);
  border-radius:10px;
  padding:9px 10px;
  outline:none;
  min-width:0;
}
.style-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) 14px minmax(0,.7fr);
  gap:6px;
  align-items:center;
}
.style-row span{color:var(--muted);text-align:center}
.add-btn{
  width:100%;
  padding:14px;
  background:transparent;
  border:1.5px dashed rgba(255,255,255,.14);
  color:var(--muted);
  font-size:13px;
}
.botbar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:60;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:rgba(15,17,21,.96);
  backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;
  gap:8px;
}
.botbar button{
  flex:1;
  padding:13px 12px;
  font-size:14px;
  font-weight:700;
}
.botbar .b-add{background:#1b2028;color:var(--text)}
.botbar .b-export{background:var(--accent);color:var(--accent-text)}
#toast{
  position:fixed;
  left:50%;
  bottom:96px;
  transform:translateX(-50%);
  background:#20242d;
  color:var(--text);
  padding:10px 16px;
  border-radius:999px;
  font-size:12px;
  opacity:0;
  transition:opacity .25s;
  pointer-events:none;
  z-index:1000;
  white-space:nowrap;
}
#loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.66);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:12px;
  z-index:9999;
}
.spin{
  width:34px;
  height:34px;
  border:3px solid rgba(255,255,255,.12);
  border-top-color:var(--text);
  border-radius:50%;
  animation:sp 0.7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
@media (max-width: 860px){
  .global{grid-template-columns:1fr}
  .card-body{grid-template-columns:1fr}
  .photo-col{max-width:170px}
  .frow{grid-template-columns:84px minmax(0,1fr)}
}
</style>
</head>
<body>
<div id="splash">
  <img id="splashIcon" src="./icon.png" alt="富贵一生" loading="eager">
  <h1>AAA富贵一生 Excel</h1>
  <p>可编辑 PDF 版，文字会直接写入 PDF，不再生成截图页。</p>
  <button class="enter-btn" onclick="enterApp()">进入</button>
</div>

<div id="app">
  <div class="topbar">
    <h1>富贵一生 Excel</h1>
    <div class="topbar-btns">
      <button class="tbtn" onclick="batchImport()">批量导入</button>
      <button class="tbtn primary" onclick="exportPDF()">导出 PDF</button>
    </div>
  </div>

  <div class="global">
    <div class="global-item">
      <label>Supplier（全组共用）</label>
      <input id="gSupplier" type="text" placeholder="供应商" oninput="syncSupplier()">
    </div>
    <div class="global-item">
      <label>Style 前缀</label>
      <input id="gPrefix" type="text" placeholder="如 PAG26" oninput="syncPrefix()">
    </div>
    <div class="global-item">
      <label>起始编号</label>
      <input id="gStart" type="number" value="1" min="1" oninput="syncNumbers()">
    </div>
  </div>

  <div id="cards"></div>
  <div style="padding:0 14px 88px">
    <button class="add-btn" onclick="addCard()">＋ 添加产品</button>
  </div>

  <div class="botbar">
    <button class="b-add" onclick="addCard()">＋ 添加</button>
    <button class="b-export" onclick="exportPDF()">导出 PDF</button>
  </div>
</div>

<input type="file" id="fileMulti" accept="image/*,.heic,.heif" multiple style="display:none">
<input type="file" id="fileSingle" accept="image/*,.heic,.heif" style="display:none">
<input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none">
<iframe id="printFrame" style="display:none;width:0;height:0;border:0;"></iframe>
<div id="toast"></div>
<div id="loading"><div class="spin"></div><div id="loadTxt">处理中...</div></div>
<script>

var cards = [];
var nextId = 1;
var persistTimer = null;
var SAMPLE_OPTIONS = ['Development Sample', 'Bought Sample', 'Bulk Sample'];
var PADDING_OPTIONS = ['', 'Flat Padding', 'Fake Down', '90%Down 10%Feather'];
var FIELD_LABELS = ['Supplier', 'Style No', 'Sample', 'Shell Fabric', 'Lining', 'Padding/Filler', 'FOB Price', 'Comments'];
var FIELD_KEYS = ['supplier', 'prefix', 'suffix', 'sample', 'shell', 'lining', 'padding', 'fob', 'comments'];
var STORAGE_KEY = 'fgys_mobile_editor_state_v1';

function enterApp() {
  var splash = document.getElementById('splash');
  splash.style.opacity = '0';
  splash.style.transition = 'opacity .35s ease';
  setTimeout(function () {
    splash.style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }, 350);
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function currentStart() {
  var v = parseInt(document.getElementById('gStart').value, 10);
  return isNaN(v) || v < 1 ? 1 : v;
}

function suffixForIndex(index) {
  return String(currentStart() + index).padStart(2, '0');
}

function createCard(data) {
  var index = cards.length;
  var globalSupplier = document.getElementById('gSupplier').value || '';
  var globalPrefix = document.getElementById('gPrefix').value || '';
  return {
    id: nextId++,
    supplier: data && data.supplier != null ? data.supplier : globalSupplier,
    prefix: data && data.prefix != null ? data.prefix : globalPrefix,
    suffix: data && data.suffix != null ? data.suffix : suffixForIndex(index),
    sample: data && data.sample != null ? data.sample : SAMPLE_OPTIONS[0],
    shell: data && data.shell != null ? data.shell : '',
    lining: data && data.lining != null ? data.lining : '',
    padding: data && data.padding != null ? data.padding : '',
    fob: data && data.fob != null ? data.fob : '',
    comments: data && data.comments != null ? data.comments : '',
    image: data && data.image ? data.image : null,
    imageType: data && data.imageType ? data.imageType : '',
    imageName: data && data.imageName ? data.imageName : ''
  };
}

function renderCards() {
  var wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  for (var i = 0; i < cards.length; i++) {
    wrap.appendChild(renderCard(cards[i], i));
  }
  schedulePersist(true);
}

function renderCard(card, index) {
  var el = document.createElement('div');
  el.className = 'card';
  el.id = 'card-' + card.id;
  var sampleOptions = SAMPLE_OPTIONS.map(function (opt) {
    return '<option value="' + escapeHtml(opt) + '"' + (card.sample === opt ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
  }).join('');
  var paddingOptions = PADDING_OPTIONS.map(function (opt) {
    return '<option value="' + escapeHtml(opt) + '"' + (card.padding === opt ? ' selected' : '') + '>' + escapeHtml(opt || ' ') + '</option>';
  }).join('');

  el.innerHTML =
    '<div class="card-hdr">' +
      '<span>产品 ' + (index + 1) + '</span>' +
      '<button type="button" aria-label="删除" data-action="delete">×</button>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="photo-col">' +
        '<div class="photo-box" data-action="pick">' +
          '<div class="photo-placeholder">' +
            '<strong>📷</strong>' +
            '<span>点击添加</span>' +
          '</div>' +
        '</div>' +
        '<div class="photo-btns">' +
          '<button type="button" data-action="shoot">拍照</button>' +
          '<button type="button" data-action="pick">相册</button>' +
        '</div>' +
      '</div>' +
      '<div class="fields-col">' +
        '<div class="frow"><label>Supplier</label><input data-field="supplier" type="text"></div>' +
        '<div class="frow"><label>Style No</label><div class="style-row">' +
          '<input data-field="prefix" type="text" placeholder="前缀">' +
          '<span>-</span>' +
          '<input data-field="suffix" type="text" placeholder="编号">' +
        '</div></div>' +
        '<div class="frow"><label>Sample</label><select data-field="sample">' + sampleOptions + '</select></div>' +
        '<div class="frow"><label>Shell Fabric</label><input data-field="shell" type="text"></div>' +
        '<div class="frow"><label>Lining</label><input data-field="lining" type="text"></div>' +
        '<div class="frow"><label>Padding/Filler</label><select data-field="padding">' + paddingOptions + '</select></div>' +
        '<div class="frow"><label>FOB Price</label><input data-field="fob" type="text"></div>' +
        '<div class="frow"><label>Comments</label><input data-field="comments" type="text"></div>' +
      '</div>' +
    '</div>';

  var preview = el.querySelector('.photo-box');
  if (card.image) {
    preview.innerHTML = '<img src="' + card.image + '" alt="">';
  }

  el.querySelector('[data-action="delete"]').addEventListener('click', function () {
    delCard(card.id);
  });
  el.querySelectorAll('[data-action="pick"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      pickSingle(card.id);
    });
  });
  el.querySelector('[data-action="shoot"]').addEventListener('click', function () {
    shoot(card.id);
  });

  FIELD_KEYS.forEach(function (field) {
    var node = el.querySelector('[data-field="' + field + '"]');
    if (!node) return;
    node.value = card[field] || '';
    node.addEventListener('input', function () {
      card[field] = node.value;
      schedulePersist();
    });
    node.addEventListener('change', function () {
      card[field] = node.value;
      schedulePersist();
    });
  });

  return el;
}

function addCard(data, silent) {
  cards.push(createCard(data || {}));
  if (!silent) renderCards();
  schedulePersist();
}

function delCard(id) {
  if (!confirm('删除这个产品？')) return;
  cards = cards.filter(function (card) { return card.id !== id; });
  syncNumbers(true);
  renderCards();
  schedulePersist();
}

function syncSupplier() {
  var value = document.getElementById('gSupplier').value;
  cards.forEach(function (card) { card.supplier = value; });
  document.querySelectorAll('[data-field="supplier"]').forEach(function (node) { node.value = value; });
  schedulePersist();
}

function syncPrefix() {
  var value = document.getElementById('gPrefix').value;
  cards.forEach(function (card) { card.prefix = value; });
  document.querySelectorAll('[data-field="prefix"]').forEach(function (node) { node.value = value; });
  schedulePersist();
}

function syncNumbers(skipRender) {
  var start = currentStart();
  cards.forEach(function (card, index) {
    card.suffix = String(start + index).padStart(2, '0');
  });
  document.querySelectorAll('[data-field="suffix"]').forEach(function (node, index) {
    node.value = String(start + index).padStart(2, '0');
  });
  if (!skipRender) {
    renderCards();
  }
  schedulePersist();
}

function ensureCardExists(id) {
  for (var i = 0; i < cards.length; i++) {
    if (cards[i].id === id) return cards[i];
  }
  return null;
}

function pickSingle(id) {
  var input = document.getElementById('fileSingle');
  input.onchange = function (e) {
    if (e.target.files && e.target.files[0]) loadImg(e.target.files[0], id);
  };
  input.value = '';
  input.click();
}

function shoot(id) {
  var input = document.getElementById('fileCamera');
  input.onchange = function (e) {
    if (e.target.files && e.target.files[0]) loadImg(e.target.files[0], id);
  };
  input.value = '';
  input.click();
}

function batchImport() {
  var input = document.getElementById('fileMulti');
  input.onchange = async function (e) {
    var files = Array.prototype.slice.call(e.target.files || []);
    if (!files.length) return;
    showLoad('导入 0/' + files.length);
    var added = 0;
    for (var i = 0; i < files.length; i++) {
      document.getElementById('loadTxt').textContent = '导入 ' + (i + 1) + '/' + files.length;
      var data = await readImageFile(files[i]);
      addCard({
        image: data.dataUrl,
        imageType: data.type,
        imageName: files[i].name
      }, true);
      added++;
    }
    renderCards();
    hideLoad();
    toast('已导入 ' + added + ' 张');
  };
  input.value = '';
  input.click();
}

async function loadImg(file, id) {
  if (!file) return;
  var data = await readImageFile(file);
  var card = ensureCardExists(id);
  if (!card) return;
  card.image = data.dataUrl;
  card.imageType = data.type;
  card.imageName = file.name;
  var box = document.querySelector('#card-' + id + ' .photo-box');
  if (box) {
    box.innerHTML = '<img src="' + data.dataUrl + '" alt="">';
  }
  schedulePersist();
}

function readImageFile(file) {
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload = function (e) {
      resolve({
        dataUrl: e.target.result,
        type: file.type || inferMime(file.name),
        name: file.name
      });
    };
    reader.onerror = function () { reject(reader.error || new Error('读取图片失败')); };
    reader.readAsDataURL(file);
  });
}

function inferMime(name) {
  var ext = String(name || '').toLowerCase().split('.').pop();
  if (ext === 'png') return 'image/png';
  if (ext === 'webp') return 'image/webp';
  if (ext === 'gif') return 'image/gif';
  if (ext === 'bmp') return 'image/bmp';
  return 'image/jpeg';
}

function schedulePersist(immediate) {
  if (persistTimer) clearTimeout(persistTimer);
  var save = function () {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        gSupplier: document.getElementById('gSupplier').value || '',
        gPrefix: document.getElementById('gPrefix').value || '',
        gStart: document.getElementById('gStart').value || '1',
        cards: cards
      }));
    } catch (e) {}
  };
  if (immediate) {
    save();
    return;
  }
  persistTimer = setTimeout(save, 120);
}

function restoreState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    document.getElementById('gSupplier').value = data.gSupplier || '';
    document.getElementById('gPrefix').value = data.gPrefix || '';
    document.getElementById('gStart').value = data.gStart || '1';
    cards = [];
    nextId = 1;
    if (data.cards && data.cards.length) {
      data.cards.forEach(function (item) {
        cards.push(createCard(item));
      });
      nextId = cards.reduce(function (max, card) { return Math.max(max, card.id); }, 0) + 1;
      return true;
    }
  } catch (e) {}
  return false;
}

var PRINT_COL_WIDTHS_MM = [26.0, 34.4, 34.4, 34.4, 34.4, 34.4];
var PRINT_ROW_SCALE = 0.94;
var PRINT_PAGE1_ROW_MM = [5.5939, 43.0075, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.3563, 3.8038, 3.2538, 43.0075, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.3563, 3.8038, 3.2538, 43.0075, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.8038, 3.2538, 43.0075, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.8038, 3.2538];
var PRINT_PAGE2_ROW_MM = [43.0075, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.3563, 3.4962, 4.1954, 43.0448, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.3563, 3.8038, 4.1954, 43.0448, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.8038, 4.1954, 43.0448, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 3.2817, 4.3353, 3.2817];
var PRINT_PAGE1_FILL = ['', '', 'BCDEF', 'ABCDEF', '', '', '', 'BCDEF', '', 'ABCEF', '', 'BCDEF', 'ABCDEF', '', 'E', '', 'BCDEF', '', 'ABCDEF', '', 'BCDEF', 'ABCDEF', '', 'B', 'C', 'BCEF', 'D', 'ABCDEF', '', 'BCDEF', 'ABCDEF', '', '', '', 'BCDEF', '', 'BCDEF'];
var PRINT_PAGE2_FILL = ['', 'BCDEF', 'ABCDEF', '', '', '', 'BCDEF', '', 'ABCEF', '', 'BCDEF', 'ABCDEF', '', 'E', '', 'BCDEF', '', 'ABCDEF', '', 'BCDEF', 'ABCDEF', '', 'B', 'C', 'BCEF', 'D', 'ABCDEF', '', 'BCDEF', 'ABCDEF', '', '', '', 'BCDEF', '', 'BCDEF'];
var PRINT_GROUP_SIZE = 5;
var PRINT_GROUPS_PER_PAGE = 4;
var PRINT_PAGE_CARDS = PRINT_GROUP_SIZE * PRINT_GROUPS_PER_PAGE;
var PRINT_MARGINS_MM = 5.9917;
var PRINT_CONTENT_WIDTH_MM = 198.0056;
var PRINT_CONTENT_HEIGHT_MM = 285.0166;
var PRINT_FIELD_LABELS = ['Supplier', 'Style no', 'Sample', 'Shell Fabric', 'Lining', 'Padding/Filler', 'FOB Price', 'CMMTS'];

function printableValue(card, field) {
  if (!card) return '';
  if (field === 'style') return (card.prefix || '') + '-' + (card.suffix || '');
  return card[field] || '';
}

function printablePageTemplate(pageIndex) {
  return pageIndex === 0 ? {
    rowHeights: PRINT_PAGE1_ROW_MM,
    fillMap: PRINT_PAGE1_FILL,
    includeTitle: true
  } : {
    rowHeights: PRINT_PAGE2_ROW_MM,
    fillMap: PRINT_PAGE2_FILL,
    includeTitle: false
  };
}

function printableCellClass(fillMap, rowPos, colLetter) {
  return (fillMap[rowPos] && fillMap[rowPos].indexOf(colLetter) !== -1) ? ' filled' : '';
}

function printableImageHtml(card) {
  if (!card || !card.image) return '<div class="empty">No Photo</div>';
  return '<img src="' + card.image + '" alt="">';
}

function buildPrintableHtml() {
  var pages = [];
  var groups = [];
  for (var i = 0; i < cards.length; i += PRINT_GROUP_SIZE) {
    groups.push(cards.slice(i, i + PRINT_GROUP_SIZE));
  }

  for (var pageIndex = 0; pageIndex < groups.length; pageIndex += PRINT_GROUPS_PER_PAGE) {
    var pageGroups = groups.slice(pageIndex, pageIndex + PRINT_GROUPS_PER_PAGE);
    var template = printablePageTemplate(pageIndex / PRINT_GROUPS_PER_PAGE);
    var rowHeights = template.rowHeights;
    var fillMap = template.fillMap;
    var rowPos = 0;
    var pageGroupsHtml = '';

    for (var g = 0; g < PRINT_GROUPS_PER_PAGE; g++) {
      var group = pageGroups[g] || [];
      var blockRows = '';
      var groupHasTitle = template.includeTitle && g === 0;

      if (groupHasTitle) {
        blockRows += '<tr style="height:' + (rowHeights[rowPos] * PRINT_ROW_SCALE) + 'mm">' +
          '<td colspan="6" class="title-cell">' + escapeHtml('SAMPLES MINI SKETCH- MENS') + '</td>' +
        '</tr>';
        rowPos += 1;
      }

      var photoRowHeight = rowHeights[rowPos] * PRINT_ROW_SCALE;
      var photoCells = '';
      photoCells += '<td class="label-cell' + printableCellClass(fillMap, rowPos, 'A') + '">' + escapeHtml('Photo') + '</td>';
      for (var p = 0; p < PRINT_GROUP_SIZE; p++) {
        var card = group[p] || null;
        photoCells += '<td class="photo-cell' + printableCellClass(fillMap, rowPos, String.fromCharCode(66 + p)) + '">' +
          '<div class="photo-wrap">' + printableImageHtml(card) + '</div>' +
        '</td>';
      }
      blockRows += '<tr style="height:' + photoRowHeight + 'mm">' + photoCells + '</tr>';
      rowPos += 1;

      for (var r = 0; r < PRINT_FIELD_LABELS.length; r++) {
        var rowHeight = rowHeights[rowPos] * PRINT_ROW_SCALE;
        var rowCells = '';
        rowCells += '<td class="label-cell' + printableCellClass(fillMap, rowPos, 'A') + '">' + escapeHtml(PRINT_FIELD_LABELS[r]) + '</td>';
        for (var q = 0; q < PRINT_GROUP_SIZE; q++) {
          var current = group[q] || null;
          var fieldName = r === 0 ? 'supplier' :
            r === 1 ? 'style' :
            r === 2 ? 'sample' :
            r === 3 ? 'shell' :
            r === 4 ? 'lining' :
            r === 5 ? 'padding' :
            r === 6 ? 'fob' : 'comments';
          var cellValue = printableValue(current, fieldName);
          rowCells += '<td class="data-cell' + printableCellClass(fillMap, rowPos, String.fromCharCode(66 + q)) + '">' + escapeHtml(cellValue) + '</td>';
        }
        blockRows += '<tr style="height:' + rowHeight + 'mm">' + rowCells + '</tr>';
        rowPos += 1;
      }

      pageGroupsHtml += '<div class="group">' +
        '<table class="sheet">' +
          '<colgroup>' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[0] + 'mm">' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[1] + 'mm">' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[2] + 'mm">' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[3] + 'mm">' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[4] + 'mm">' +
            '<col style="width:' + PRINT_COL_WIDTHS_MM[5] + 'mm">' +
          '</colgroup>' +
          '<tbody>' + blockRows + '</tbody>' +
        '</table>' +
      '</div>';
    }

    var pageCssClass = pageIndex === 0 ? 'page page-first' : 'page';
    pages.push('<section class="' + pageCssClass + '">' +
      '<div class="page-body">' + pageGroupsHtml + '</div>' +
    '</section>');
  }

  return '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">' +
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
    '<style>' +
      '@page{size:A4 portrait;margin:' + PRINT_MARGINS_MM + 'mm}' +
      'html,body{margin:0;padding:0;background:#fff;color:#000;font-family:Arial,Helvetica,sans-serif}' +
      'body{width:' + PRINT_CONTENT_WIDTH_MM + 'mm}' +
      '.page{width:' + PRINT_CONTENT_WIDTH_MM + 'mm;page-break-after:always;break-after:page}' +
      '.page:last-child{page-break-after:auto;break-after:auto}' +
      '.page-body{display:flex;flex-direction:column;gap:0}' +
      '.group{break-inside:avoid;page-break-inside:avoid;overflow:hidden}' +
      '.sheet{width:100%;border-collapse:collapse;table-layout:fixed}' +
      '.sheet td{border:1px solid #000;padding:0 1.1mm;overflow:hidden;vertical-align:middle;text-align:center;font-size:5.95pt;line-height:1.05;background:#fff}' +
      '.sheet tr{break-inside:avoid;page-break-inside:avoid}' +
      '.sheet .filled{background:#efefef}' +
      '.sheet .label-cell{font-weight:700}' +
      '.sheet .title-cell{font-size:12pt;font-weight:700;letter-spacing:0;text-align:center;border-bottom:0}' +
      '.sheet .photo-cell{padding:0.6mm}' +
      '.sheet .photo-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}' +
      '.sheet .photo-wrap img{max-width:100%;max-height:100%;display:block;object-fit:contain}' +
      '.sheet .empty{font-size:10pt;color:#666}' +
      '.page-first{margin-top:0}' +
    '</style></head><body>' +
    pages.join('') +
    '</body></html>';
}

function exportPDF() {
  if (!cards.length) {
    toast('请先添加产品');
    return;
  }

  showLoad('准备打印 PDF...');
  try {
    var frame = document.getElementById('printFrame');
    var doc = frame.contentWindow.document;
    doc.open();
    doc.write(buildPrintableHtml());
    doc.close();
    setTimeout(function () {
      hideLoad();
      toast('请在打印面板里选择“存储为 PDF”');
      frame.contentWindow.focus();
      frame.contentWindow.print();
    }, 300);
  } catch (err) {
    hideLoad();
    toast('生成失败: ' + (err && err.message ? err.message : err));
    console.error(err);
  }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function () {
    t.style.opacity = '0';
  }, 2500);
}

function showLoad(text) {
  document.getElementById('loadTxt').textContent = text || '处理中...';
  document.getElementById('loading').style.display = 'flex';
}

function hideLoad() {
  document.getElementById('loading').style.display = 'none';
}

// 初始状态
if (!restoreState()) {
  addCard({
    supplier: '',
    prefix: '',
    suffix: suffixForIndex(0),
    sample: SAMPLE_OPTIONS[0],
    shell: '',
    lining: '',
    padding: '',
    fob: '',
    comments: ''
  }, true);
}
renderCards();
</script>
</body>
</html>
